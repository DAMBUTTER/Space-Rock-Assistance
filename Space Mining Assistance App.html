<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Material Tools</title>

<style>
body {
    margin:0;
    background:#0b0b0b;
    font-family:Arial;
}

/* TOP BAR */
#nav {
    background:#111;
    padding:10px;
    text-align:center;
    border-bottom:2px solid #ff2a2a;
}

#nav button {
    padding:10px 20px;
    margin:0 10px;
    background:black;
    border:1px solid #ff2a2a;
    color:#ff2a2a;
    cursor:pointer;
}

#nav button:hover {
    background:#ff2a2a;
    color:black;
}

/* IFRAME */
.frame {
    width:100%;
    height:95vh;
    border:none;
    display:none;
}

.active {
    display:block;
}
</style>
</head>

<body>

<div id="nav">
    <button onclick="show('tracker')">Tracker</button>
    <button onclick="show('raw')">Raw Data</button>
    <button onclick="show('rock')">Rock Type</button>
</div>

<!-- PROGRAM 1 -->
<iframe id="tracker" class="frame active" src="YR-DATA8.0.html"></iframe>

<!-- PROGRAM 2 -->
<iframe id="raw" class="frame" src="RDTB-DATA.html"></iframe>

<!-- PROGRAM 3 -->
<iframe id="rock" class="frame" src="WHATTHEROCK2.1.html"></iframe>

<script>
function show(id){
    document.querySelectorAll(".frame").forEach(f=>f.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}
</script>

</body>
</html>
